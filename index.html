<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polkadot Daily Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --newsprint: #f2ede3;
  --paper:     #faf8f2;
  --ink:       #191714;
  --ink2:      #5a5650;
  --ink3:      #9a9690;
  --rule-lt:   rgba(25,23,20,0.14);
  --accent:    #e6007a;
  --green:     #2d7a47;
  --orange:    #b85c00;
  --blue:      #1a5fa8;
  --gray:      #6e6e6e;
  --col-gap:   28px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--newsprint);
  color: var(--ink);
  font-family: 'Crimson Pro', Georgia, 'Times New Roman', serif;
  -webkit-font-smoothing: antialiased;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Masthead ── */
.masthead {
  background: var(--paper);
  border-bottom: 3px double var(--ink);
}
.masthead-rule-top {
  height: 4px;
  background: var(--accent);
}
.masthead-inner {
  max-width: 960px; margin: 0 auto;
  padding: 16px 24px 18px;
  text-align: center;
}
.masthead-meta {
  display: flex; justify-content: space-between; align-items: baseline;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1.3px;
  color: var(--ink3); margin-bottom: 8px;
}
.masthead-brand {
  font-family: 'Playfair Display', serif;
  font-size: clamp(30px, 5.5vw, 60px);
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1;
  color: var(--ink);
  margin-bottom: 7px;
}
.masthead-brand .dot-word { color: var(--accent); }
.masthead-tagline {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--ink2);
}
.masthead-rule-double {
  height: 3px;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  margin: 14px 0 0;
}

/* ── Nav ── */
.nav {
  background: var(--paper);
  border-bottom: 1px solid var(--ink);
  position: sticky; top: 0; z-index: 100;
}
.nav-inner {
  max-width: 960px; margin: 0 auto; padding: 0 24px;
  height: 40px; display: flex; align-items: center; justify-content: center;
}
.nav-tabs { display: flex; }
.nav-tab {
  padding: 0 22px; height: 40px;
  display: flex; align-items: center;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.4px;
  color: var(--ink2);
  cursor: pointer; border: none; background: none;
  border-right: 1px solid var(--rule-lt);
  transition: color 0.1s, background 0.1s;
}
.nav-tab:first-child { border-left: 1px solid var(--rule-lt); }
.nav-tab:hover  { color: var(--ink); background: rgba(25,23,20,0.04); }
.nav-tab.active { color: var(--paper); background: var(--ink); }

/* ── Layout ── */
.wrap { max-width: 960px; margin: 0 auto; padding: 0 24px; }
.page { display: none; padding-bottom: 64px; }
.page.active { display: block; }

/* ── Eyebrow ── */
.eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.6px;
  color: var(--ink3); margin-bottom: 10px;
}

/* ── Stat chips ── */
.chips {
  display: flex; gap: 0; flex-wrap: nowrap;
  border: 1px solid var(--rule-lt);
  background: var(--paper);
}
.chip {
  flex: 1; min-width: 72px;
  padding: 14px 10px; text-align: center;
  border-right: 1px solid var(--rule-lt);
}
.chip:last-child { border-right: none; }
.chip-num {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
  color: var(--accent); line-height: 1; margin-bottom: 4px;
}
.chip-lbl {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--ink2);
}

/* ── Home ── */
.home-intro {
  padding: 32px 0 24px;
  border-bottom: 3px double var(--ink);
  margin-bottom: 32px;
}
.home-intro-date {
  font-family: 'Playfair Display', serif;
  font-style: italic; font-size: 17px; color: var(--ink2);
  margin-bottom: 6px;
}
.home-intro-headline {
  font-family: 'Playfair Display', serif;
  font-size: 32px; font-weight: 900; letter-spacing: -0.5px;
  line-height: 1.1;
}
.accent { color: var(--accent); }
.home-block { margin-bottom: 36px; }

/* Digest list row */
.d-row {
  background: var(--paper);
  border-bottom: 1px solid var(--rule-lt);
  padding: 15px 18px 15px 20px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
  width: 100%; text-align: left; color: inherit;
  font-family: inherit;
  transition: border-left-color 0.15s, background 0.12s;
}
.d-row:first-child { border-top: 2px solid var(--ink); }
.d-row:last-child  { border-bottom: 2px solid var(--ink); }
.d-row:hover { border-left-color: var(--accent); background: #ece8dc; }
.d-row-info { flex: 1; min-width: 0; }
.d-row-date {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
}
.d-row-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; color: var(--ink2); margin-top: 2px;
  text-transform: uppercase; letter-spacing: 0.6px;
}
.d-arrow { font-size: 18px; color: var(--ink3); flex-shrink: 0; }

/* ── Digests list page ── */
.page-header {
  padding: 30px 0 18px;
  border-bottom: 3px double var(--ink);
  margin-bottom: 22px;
}
.page-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 34px; font-weight: 900; letter-spacing: -0.5px;
}

/* ── Detail page ── */
.back-btn {
  display: inline-flex; align-items: center; gap: 3px;
  color: var(--ink2);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  cursor: pointer; border: none; background: none; padding: 20px 0 0;
}
.back-btn:hover { color: var(--accent); }

.detail-masthead {
  padding: 16px 0 22px;
  border-bottom: 3px double var(--ink);
  margin-bottom: 28px;
  text-align: center;
}
.detail-edition {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.8px;
  color: var(--ink3); margin-bottom: 10px;
}
.detail-masthead h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(24px, 4vw, 42px);
  font-weight: 900; letter-spacing: -0.5px; line-height: 1.1;
}

/* ── Section banner ── */
.section-banner {
  display: flex; align-items: center; gap: 10px;
  margin: 36px 0 14px;
}
.section-banner-line { flex: 1; height: 2px; background: var(--ink); }
.section-banner-icon { font-size: 13px; flex-shrink: 0; }
.section-banner-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  color: var(--ink); white-space: nowrap;
}

/* ── News grid (2-column newspaper layout) ── */
.news-grid {
  column-count: 2;
  column-gap: var(--col-gap);
  column-rule: 1px solid var(--rule-lt);
}

/* News item — no cards, pure typography */
.news-card {
  break-inside: avoid;
  border-top: 1.5px solid var(--ink);
  padding: 13px 0 16px;
  background: none; box-shadow: none; border-radius: 0;
  margin-bottom: 0;
}
.news-inner { padding: 0; border-left: none !important; }
.news-title {
  font-family: 'Playfair Display', serif;
  font-size: 15.5px; font-weight: 700;
  line-height: 1.35; margin-bottom: 6px; color: var(--ink);
}
.news-body {
  font-family: 'Crimson Pro', serif;
  font-size: 15px; color: var(--ink2); line-height: 1.65;
}
.news-body code {
  font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px;
  background: rgba(25,23,20,0.07); padding: 1px 5px;
  border-radius: 2px; color: var(--ink);
}
.news-body a {
  color: var(--accent); text-decoration: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid rgba(230,0,122,0.35);
  padding-bottom: 1px; margin: 0 2px;
  display: inline; transition: border-color 0.1s;
}
.news-body a:hover { border-color: var(--accent); }

/* ── Gov sub-label ── */
.gov-sub-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--ink3); margin: 22px 0 10px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--rule-lt);
}
.gov-sub-label:first-child { margin-top: 0; }

/* ── Gov grid ── */
.gov-grid {
  column-count: 2;
  column-gap: var(--col-gap);
  column-rule: 1px solid var(--rule-lt);
}

/* Referendum card — newspaper brief */
.ref-card {
  break-inside: avoid;
  border-top: 1px solid var(--rule-lt);
  padding: 11px 0 13px;
  background: none; box-shadow: none; border-radius: 0;
}
.ref-top {
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 4px; flex-wrap: wrap;
}
.ref-id {
  font-family: 'Playfair Display', serif;
  font-size: 13px; font-weight: 700;
  color: var(--accent); text-decoration: none;
}
.ref-id:hover { text-decoration: underline; }
.ref-badge {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  padding: 2px 6px; border-radius: 2px; white-space: nowrap;
}
.b-submitted { background: rgba(26,95,168,0.1);   color: var(--blue);   }
.b-decision  { background: rgba(184,92,0,0.1);    color: var(--orange); }
.b-executed  { background: rgba(45,122,71,0.1);   color: var(--green);  }
.b-timeout   { background: rgba(110,110,110,0.1); color: var(--gray);   }
.b-confirmed { background: rgba(45,122,71,0.1);   color: var(--green);  }
.ref-title-text {
  font-family: 'Crimson Pro', serif;
  font-size: 14px; color: var(--ink);
  line-height: 1.4; margin-bottom: 7px;
}
.ref-foot {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  font-family: 'DM Sans', sans-serif; font-size: 11px;
}
.aye-row { display: flex; align-items: center; gap: 5px; }
.aye-track { width: 40px; height: 3px; background: rgba(25,23,20,0.1); border-radius: 1px; overflow: hidden; }
.aye-fill  { height: 100%; background: var(--green); border-radius: 1px; }
.aye-pct   { font-weight: 700; color: var(--green); }
.ref-by    { color: var(--ink2); }
.ref-by a  { color: var(--accent); text-decoration: none; font-weight: 600; }
.ref-by a:hover { text-decoration: underline; }
.ref-dl    { font-weight: 700; color: var(--orange); }

/* ── Processing log ── */
.log-block {
  margin-top: 36px; padding-top: 20px;
  border-top: 3px double var(--ink);
}
.log-block h3 {
  font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 700;
  letter-spacing: -0.2px; margin-bottom: 3px;
}
.log-block p {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; color: var(--ink2); margin-bottom: 14px;
}
.log-chips {
  display: flex; gap: 0; flex-wrap: nowrap;
  border: 1px solid var(--rule-lt);
}
.log-chip {
  flex: 1;
  background: var(--paper);
  padding: 12px 10px; text-align: center;
  border-right: 1px solid var(--rule-lt);
  border-radius: 0; box-shadow: none;
}
.log-chip:last-child { border-right: none; }
.log-chip-num {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
  color: var(--ink); line-height: 1;
}
.log-chip-lbl {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px; color: var(--ink2); font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; margin-top: 3px;
}

/* Loading */
.loading {
  text-align: center; padding: 48px 0;
  font-family: 'DM Sans', sans-serif;
  color: var(--ink3); font-size: 13px;
}
.spinner {
  width: 24px; height: 24px; border-radius: 50%; margin: 0 auto 12px;
  border: 2px solid rgba(230,0,122,0.15); border-top-color: var(--accent);
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Footer */
.footer {
  border-top: 3px double var(--ink);
  background: var(--paper);
  padding: 20px 0; text-align: center;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; color: var(--ink3);
}
.footer a { color: var(--accent); text-decoration: none; }

@media (max-width: 640px) {
  .news-grid { column-count: 1; }
  .gov-grid  { column-count: 1; }
}
@media (max-width: 480px) {
  .chips, .log-chips { flex-wrap: wrap; }
  .chip, .log-chip { min-width: 45%; border-bottom: 1px solid var(--rule-lt); }
  .masthead-brand { font-size: 26px; }
  .masthead-meta  { font-size: 9px; }
}
</style>
</head>
<body>

<!-- Masthead -->
<header class="masthead">
  <div class="masthead-rule-top"></div>
  <div class="masthead-inner">
    <div class="masthead-meta">
      <span>Est. 2025</span>
      <span id="masthead-date">By Pala Labs</span>
    </div>
    <div class="masthead-brand"><span class="dot-word">Polkadot</span> Daily Digest</div>
    <div class="masthead-tagline">Ecosystem intelligence, curated daily</div>
    <div class="masthead-rule-double"></div>
  </div>
</header>

<!-- Nav -->
<nav class="nav">
  <div class="nav-inner">
    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-home"    onclick="nav('home')">Front Page</button>
      <button class="nav-tab"        id="tab-digests" onclick="nav('digests')">All Editions</button>
    </div>
  </div>
</nav>

<!-- HOME -->
<div id="page-home" class="page active">
  <div class="wrap">
    <div class="home-intro">
      <div class="home-intro-date" id="home-date"></div>
      <div class="home-intro-headline">Polkadot <span class="accent">Ecosystem</span> Briefing</div>
    </div>
    <div class="home-block">
      <div class="eyebrow">Cumulative Data Points</div>
      <div class="chips" id="home-stats"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="home-block">
      <div class="eyebrow">Recent Editions</div>
      <div id="home-recent"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<!-- DIGESTS LIST -->
<div id="page-digests" class="page">
  <div class="wrap">
    <div class="page-header"><h1>All Editions</h1></div>
    <div id="list-body"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- DIGEST DETAIL -->
<div id="page-detail" class="page">
  <div class="wrap">
    <button class="back-btn" id="back-btn">&#8249; Back</button>
    <div class="detail-masthead">
      <div class="detail-edition">Polkadot Daily Digest</div>
      <h1 id="detail-title"></h1>
    </div>
    <div id="detail-body"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<footer class="footer">
  <div class="wrap">
    Auto-generated by <a href="https://palalabs.io" target="_blank">Pala Labs</a> ·
    Governance data via <a href="https://openshore.io" target="_blank">OpenShore</a>
  </div>
</footer>

<script>
// ─────────────────────────── Config ───────────────────────────
const STAT_DEFS = [
  { key: 'Polkadot Forum',         label: 'Forum' },
  { key: 'Medium',                 label: 'Articles' },
  { key: 'X(Twitter)',             label: 'Tweets' },
  { key: 'GitHub (Release only)',  label: 'Releases' },
  { key: 'OpenGov',                label: 'Proposals' },
];

const SECTION_ICONS = {
  'technical': '⚙️', 'ecosystem': '🌐', 'other': '📋', 'opengov updates': '🗳️'
};
const SECTION_CLS = {
  'technical': 'tech', 'ecosystem': 'ecosystem', 'other': 'other'
};
const BADGE_CLS = {
  submitted: 'b-submitted', decision: 'b-decision',
  executed:  'b-executed',  timeout: 'b-timeout', confirmed: 'b-confirmed'
};

// ─────────────────────────── State ────────────────────────────
let manifests  = [];
let docCache   = {};
let prevPage   = 'home';

// ─────────────────────────── Navigation ───────────────────────
function nav(page) {
  ['home','digests','detail'].forEach(p => {
    document.getElementById('page-'+p).classList.toggle('active', p === page);
  });
  ['home','digests'].forEach(t => {
    const el = document.getElementById('tab-'+t);
    if (el) el.classList.toggle('active', t === page);
  });
  if (page !== 'detail') prevPage = page;
  window.scrollTo(0, 0);
}

// ─────────────────────────── Data ─────────────────────────────
async function fetchDigest(date) {
  if (docCache[date]) return docCache[date];
  const res = await fetch('digests/' + date + '.html');
  if (!res.ok) throw new Error('Not found');
  const html = await res.text();
  const doc  = new DOMParser().parseFromString(html, 'text/html');
  docCache[date] = doc;
  return doc;
}

function extractStats(doc) {
  const stats = {};
  let inLogs  = false;
  doc.querySelectorAll('h2, ul').forEach(el => {
    if (el.tagName === 'H2') {
      inLogs = el.textContent.trim().toLowerCase() === 'processing logs';
      return;
    }
    if (!inLogs) return;
    el.querySelectorAll('li').forEach(li => {
      const m = li.textContent.trim().match(/^(.+?):\s*(\d+)$/);
      if (m) stats[m[1].trim()] = parseInt(m[2]);
    });
  });
  return stats;
}

function mergeStats(allStats) {
  const out = {};
  allStats.forEach(s => {
    Object.entries(s).forEach(([k, v]) => { out[k] = (out[k] || 0) + v; });
  });
  return out;
}

async function loadManifest() {
  try {
    const res = await fetch('digests/manifest.json');
    if (!res.ok) throw new Error();
    manifests = await res.json();
  } catch {
    const today = new Date().toISOString().split('T')[0];
    manifests = [{ date: today, title: 'Polkadot Daily Digest' }];
  }
  manifests.sort((a, b) => b.date.localeCompare(a.date));
}

// ─────────────────────────── Formatting ───────────────────────
function fmtDate(iso) {
  return new Date(iso + 'T12:00:00').toLocaleDateString('en-GB', {
    day: 'numeric', month: 'long', year: 'numeric'
  });
}

function fmtDateLong(iso) {
  return new Date(iso + 'T12:00:00').toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

function badgeCls(status) {
  return BADGE_CLS[(status || '').toLowerCase()] || 'b-submitted';
}

// ─────────────────────────── Render helpers ───────────────────
function renderChips(totals, reportCount) {
  const cols = STAT_DEFS.map(d => {
    const n = totals[d.key] || 0;
    return '<div class="chip"><div class="chip-num">' + n + '</div><div class="chip-lbl">' + d.label + '</div></div>';
  });
  const total = STAT_DEFS.reduce((s, d) => s + (totals[d.key] || 0), 0);
  cols.push('<div class="chip"><div class="chip-num">' + total + '</div><div class="chip-lbl">Total</div></div>');
  if (reportCount != null) {
    cols.push('<div class="chip"><div class="chip-num">' + reportCount + '</div><div class="chip-lbl">Editions</div></div>');
  }
  return cols.join('');
}

function renderDigestRow(m) {
  return '<button class="d-row" onclick="openDigest(\'' + m.date + '\')">' +
    '<div class="d-row-info">' +
      '<div class="d-row-date">' + fmtDate(m.date) + '</div>' +
      '<div class="d-row-sub">Polkadot Daily Digest</div>' +
    '</div>' +
    '<div class="d-arrow">&#8250;</div>' +
  '</button>';
}

function parseRef(p) {
  const links   = p.querySelectorAll('a');
  const refLink = links[0];
  const prLink  = links[1];
  const text    = p.textContent;

  const id     = (text.match(/Referendum\s+(\d+)/)                    || [])[1] || '';
  const rawT   = (text.match(/Referendum\s+\d+[:\s]+([^➖\n]+)/)       || [])[1] || '';
  const aye    = (text.match(/Current Aye:\s*([\d.]+%)/)               || [])[1] || '0%';
  const status = (text.match(/Status:\s*([^➖\n]+?)(?:\s*➖|$)/)        || [])[1]?.trim() || '';
  const dl     = (text.match(/Decision In:\s*([^➖\n]+?)(?:\s*➖|$)/)   || [])[1]?.trim() || '';

  return {
    id, status, dl,
    aye:    aye,
    ayePct: parseFloat(aye) || 0,
    title:  rawT.replace(/[:\s]+$/, '').trim(),
    refUrl: refLink ? refLink.href : '#',
    prName: prLink  ? prLink.textContent.trim() : '',
    prUrl:  prLink  ? prLink.href : '#',
  };
}

function renderRef(r) {
  const w = Math.min(r.ayePct, 100);
  return '<div class="ref-card">' +
    '<div class="ref-top">' +
      '<a class="ref-id" href="' + r.refUrl + '" target="_blank">#' + r.id + '</a>' +
      '<span class="ref-badge ' + badgeCls(r.status) + '">' + r.status + '</span>' +
    '</div>' +
    '<div class="ref-title-text">' + r.title + '</div>' +
    '<div class="ref-foot">' +
      '<div class="aye-row">' +
        '<div class="aye-track"><div class="aye-fill" style="width:' + w + '%"></div></div>' +
        '<span class="aye-pct">' + r.aye + '</span>' +
        '<span style="color:var(--ink3)">Aye</span>' +
      '</div>' +
      (r.prName ? '<div class="ref-by">by <a href="' + r.prUrl + '" target="_blank">' + r.prName + '</a></div>' : '') +
      (r.dl     ? '<div class="ref-dl">⏱ ' + r.dl + '</div>' : '') +
    '</div>' +
  '</div>';
}

function nextBlockquote(el) {
  let cur = el ? el.nextElementSibling : null;
  while (cur && cur.tagName !== 'BLOCKQUOTE' && cur.tagName !== 'H3' && cur.tagName !== 'H2') {
    cur = cur.nextElementSibling;
  }
  return cur && cur.tagName === 'BLOCKQUOTE' ? cur : null;
}

function renderNewsItem(li, cls) {
  const strong = li.querySelector('strong');
  const title  = strong ? strong.textContent.replace(/:$/, '').trim() : '';
  const clone  = li.cloneNode(true);
  clone.querySelector('strong') && clone.querySelector('strong').remove();
  const body = clone.innerHTML.replace(/^\s*:\s*/, '').trim();
  return '<div class="news-card"><div class="news-inner ' + (cls || '') + '">' +
    '<div class="news-title">' + title + '</div>' +
    '<div class="news-body">'  + body  + '</div>' +
  '</div></div>';
}

function sectionBanner(icon, label) {
  return '<div class="section-banner">' +
    '<div class="section-banner-line"></div>' +
    '<span class="section-banner-icon">' + icon + '</span>' +
    '<div class="section-banner-title">' + label + '</div>' +
    '<div class="section-banner-line"></div>' +
  '</div>';
}

function renderNewsSection(h2) {
  const key   = h2.textContent.trim().toLowerCase();
  const icon  = SECTION_ICONS[key] || '📌';
  const cls   = SECTION_CLS[key]   || '';
  const items = [];

  let el = h2.nextElementSibling;
  while (el && el.tagName !== 'H2') {
    if (el.tagName === 'UL') el.querySelectorAll('li').forEach(li => items.push(li));
    el = el.nextElementSibling;
  }
  if (!items.length) return '';

  return '<div class="report-section">' +
    sectionBanner(icon, h2.textContent.trim()) +
    '<div class="news-grid">' +
      items.map(li => renderNewsItem(li, cls)).join('') +
    '</div>' +
  '</div>';
}

function renderGovSection(h2) {
  let out = '<div class="report-section">' +
    sectionBanner('🗳️', h2.textContent.trim());

  let el = h2.nextElementSibling;
  while (el && el.tagName !== 'H2') {
    if (el.tagName === 'H3') {
      const label = el.textContent.trim();
      const bq    = nextBlockquote(el);
      if (bq) {
        const refs = Array.from(bq.querySelectorAll('p')).map(parseRef);
        out += '<div class="gov-sub-label">' + label + '</div>';
        out += '<div class="gov-grid">' + refs.map(renderRef).join('') + '</div>';
      }
    }
    el = el.nextElementSibling;
  }
  return out + '</div>';
}

function renderLogChips(stats) {
  if (!Object.keys(stats).length) return '';
  const chips = STAT_DEFS
    .filter(d => stats[d.key] != null)
    .map(d => '<div class="log-chip"><div class="log-chip-num">' + stats[d.key] + '</div><div class="log-chip-lbl">' + d.label + '</div></div>');
  const total = STAT_DEFS.reduce((s, d) => s + (stats[d.key] || 0), 0);
  chips.push('<div class="log-chip"><div class="log-chip-num">' + total + '</div><div class="log-chip-lbl">Total</div></div>');

  return '<div class="log-block">' +
    '<h3>Processing Logs</h3>' +
    '<p>Data points curated &amp; analysed for this report</p>' +
    '<div class="log-chips">' + chips.join('') + '</div>' +
  '</div>';
}

function renderReport(doc) {
  let out     = '';
  let govHTML = '';

  doc.querySelectorAll('h2').forEach(h2 => {
    const key = h2.textContent.trim().toLowerCase();
    if (key === 'processing logs') return;
    if (key === 'opengov updates') { govHTML = renderGovSection(h2); return; }
    out += renderNewsSection(h2);
  });

  out += govHTML;
  out += renderLogChips(extractStats(doc));

  return out || '<div class="loading">No content found.</div>';
}

// ─────────────────────────── Page actions ─────────────────────
async function openDigest(date) {
  nav('detail');
  document.getElementById('detail-title').textContent = fmtDateLong(date);
  document.getElementById('detail-body').innerHTML    = '<div class="loading"><div class="spinner"></div></div>';

  document.getElementById('back-btn').onclick = () => nav(prevPage);

  try {
    const doc = await fetchDigest(date);
    document.getElementById('detail-body').innerHTML = renderReport(doc);
  } catch {
    document.getElementById('detail-body').innerHTML =
      '<div class="loading">Could not load digest for ' + date + '.</div>';
  }
}

// ─────────────────────────── Init ─────────────────────────────
async function init() {
  // Set masthead date
  const today = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('masthead-date').textContent = today;
  document.getElementById('home-date').textContent     = today;

  await loadManifest();

  const allDocs  = await Promise.allSettled(manifests.map(m => fetchDigest(m.date)));
  const allStats = allDocs
    .filter(r => r.status === 'fulfilled')
    .map(r => extractStats(r.value));
  const totals   = mergeStats(allStats);

  document.getElementById('home-stats').innerHTML =
    renderChips(totals, manifests.length);

  const recent = manifests.slice(0, 5);
  document.getElementById('home-recent').innerHTML =
    recent.map(renderDigestRow).join('') || '<div class="loading">No editions found.</div>';

  document.getElementById('list-body').innerHTML =
    manifests.map(renderDigestRow).join('') || '<div class="loading">No editions found.</div>';
}

init();
</script>
